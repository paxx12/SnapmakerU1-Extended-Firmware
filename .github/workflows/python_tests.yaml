name: Python tests

on:
  push:
    branches:
      - develop
    paths:
      - 'overlays/**/*.py'
      - 'tests/python/**'
      - 'Makefile'
      - '.github/workflows/python_tests.yaml'
  pull_request:
    paths:
      - 'overlays/**/*.py'
      - 'tests/python/**'
      - 'Makefile'
      - '.github/workflows/python_tests.yaml'
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install --no-cache-dir pytest

      - name: Run unit tests
        run: make test-python
