[gcode_macro TIMELAPSE_START]
rename_existing: _TIMELAPSE_START_BASE
description: Force timelapse start regardless of print preferences
gcode:
    _TIMELAPSE_START_BASE {rawparams} FORCE=1

[gcode_macro TIMELAPSE_TAKE_FRAME]
rename_existing: _TIMELAPSE_TAKE_FRAME_BASE
description: Force timelapse frame capture regardless of print preferences
gcode:
    _TIMELAPSE_TAKE_FRAME_BASE {rawparams} FORCE=1
