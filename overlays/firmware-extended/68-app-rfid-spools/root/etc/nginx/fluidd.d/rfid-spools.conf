# Nginx config for RFID Spools page
# Deploy to: /etc/nginx/fluidd.d/rfid-spools.conf
#
# The Spoolman URL is entered in the web UI and sent by the browser as the
# X-Spoolman-Target request header.  Nginx proxies to that address so there
# are no browser CORS restrictions (all requests stay same-origin).

location = /rfid-spools {
    return 302 /rfid-spools/;
}

location /rfid-spools/ {
    alias /usr/local/share/rfid-spools/html/;
    index index.html;
}

# Spoolman reverse-proxy.
# resolver is mandatory for nginx to accept a variable in proxy_pass.
# For IP-based targets no DNS lookup actually occurs; the directive just
# needs to be present.  Change to your router/nameserver if 127.0.0.1
# doesn't work.
location /rfid-spools/spoolman/ {
    resolver 127.0.0.1 valid=30s ipv6=off;

    # Extract the path portion that follows /rfid-spools/spoolman
    set $sm_path "/";
    if ($uri ~ ^/rfid-spools/spoolman(/.+)$) {
        set $sm_path $1;
    }

    # Forward to the Spoolman address provided by the page via header
    set $sm_target $http_x_spoolman_target;
    proxy_pass         $sm_target$sm_path$is_args$args;

    proxy_http_version 1.1;
    proxy_set_header   Host              $http_host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Spoolman-Target "";
    proxy_set_header   Connection        "";
    proxy_buffering    off;
    proxy_read_timeout 30s;
}
