# RFID Spools Management UI
location = /spools {
    return 301 /spools/;
}

location /spools/ {
    alias /usr/local/share/rfid-spools/html/;
    index index.html;
}

# RFID Spools API proxy
location /spools/api/ {
    auth_request /auth_check;
    proxy_pass http://127.0.0.1:8093/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # SSE / long-polling friendliness for /spools/api/events.
    # The upstream sets X-Accel-Buffering: no on the events stream, but
    # we also disable buffering/caching here as defense in depth and
    # raise the read timeout so an idle SSE connection is not killed
    # at the default 60s.
    proxy_buffering off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    chunked_transfer_encoding on;
}
