<!--
  Templates for the Tag Mapping config page.

  Hooks (data-id):
    - table   : container into which mapping rows are appended
    - to      : "to" generic-field <select>      (rendered by ConfigShared.buildSelect)
    - from    : "from" source-field <select>     (rendered by ConfigShared.buildSelect)
    - remove  : remove-row button
    - add-row : add-row button
-->
<template id="config-mapping-block">
    <div class="mapping-block">
        <div class="mapping-table" data-id="table"></div>
        <button class="mapping-add-btn" data-id="add-row" type="button">+ Add row</button>
    </div>
</template>

<template id="config-mapping-row">
    <div class="mapping-row">
        <span class="mapping-slot" data-id="to-slot"></span>
        <span class="mapping-arrow">←</span>
        <span class="mapping-slot" data-id="from-slot"></span>
        <button class="mapping-remove-btn" data-id="remove" type="button" title="Remove row">×</button>
    </div>
</template>
