# OpenRFID exporter config for rfid-spools backend.
# Sends full tag data (filament + scan + reader) to the rfid-spools API
# so the management UI can display all parsed fields and tag type info.

[webhook_exporter rfid_spools_success]
method = POST
event = tag_read
url = http://127.0.0.1:8093/api/tag-event
body_json_template = {
        "event": "tag_read",
        "channel": {{ reader.slot }},
        "reader": {
            "name": "{{ reader.name }}",
            "slot": {{ reader.slot }}
        },
        "scan": {
            "uid": "{{ scan.uid }}",
            "tag_type": "{{ scan.tag_type.name }}"
        },
        "filament": {{ filament | tojson }}
    }

[webhook_exporter rfid_spools_error]
method = POST
event = tag_parse_error
url = http://127.0.0.1:8093/api/tag-event
body_json_template = {
        "event": "tag_parse_error",
        "channel": {{ reader.slot }},
        "reader": {
            "name": "{{ reader.name }}",
            "slot": {{ reader.slot }}
        },
        "scan": {% if scan %}{ "uid": "{{ scan.uid }}", "tag_type": "{{ scan.tag_type.name }}" }{% else %}null{% endif %},
        "filament": null
    }

[webhook_exporter rfid_spools_not_present]
method = POST
event = tag_not_present
url = http://127.0.0.1:8093/api/tag-event
body_json_template = {
        "event": "tag_not_present",
        "channel": {{ reader.slot }},
        "reader": {
            "name": "{{ reader.name }}",
            "slot": {{ reader.slot }}
        },
        "scan": null,
        "filament": null
    }
