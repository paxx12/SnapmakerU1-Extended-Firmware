# Panda Breath — Managed Heater Configuration & Macros
# This file is managed by firmware-config and must not be edited.
# It is symlinked into your config directory and will be overwritten on firmware upgrades.

[heater_generic panda_breath]
heater_pin: panda_breath:pwm
sensor_type: panda_breath
control: watermark
max_delta: 1
min_temp: 15
max_temp: 80

[verify_heater panda_breath]
# The Panda Breath is a slow external chamber heater with coarse 1C reporting.
# A higher max_error avoids false positives on long chamber holds.
max_error: 600
check_gain_time: 360
hysteresis: 5
heating_gain: 1

[gcode_macro M141]
description: Set chamber temperature (Panda Breath)
gcode:
    {% set s = params.S|default(0)|float %}
    SET_HEATER_TEMPERATURE HEATER="panda_breath" TARGET={s}

[gcode_macro M191]
description: Wait for Chamber Temperature
gcode:
    {% set s = params.S|default(0)|float %}
    M141 S{s}
    TEMPERATURE_WAIT SENSOR="heater_generic panda_breath" MINIMUM={s}
