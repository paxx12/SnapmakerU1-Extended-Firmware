# Panda Breath — Chamber Heater
# This file is managed by firmware-config. Do not edit directly.
# To change settings, edit the copy in:
#   /home/lava/printer_data/config/extended/klipper/panda_breath.cfg

[panda_breath]
firmware: stock
# You may need to change the host to the IP address of your Panda Breath device if .local resolution fails
host: PandaBreath.local
port: 80

[heater_generic panda_breath]
heater_pin: panda_breath:pwm
sensor_type: panda_breath
control: watermark
max_delta: 1
min_temp: 15
max_temp: 80

[verify_heater panda_breath]
# The Panda Breath is a slow external chamber heater with coarse 1C reporting.
# A higher max_error avoids false positives on long chamber holds.
max_error: 600
check_gain_time: 360
hysteresis: 5
heating_gain: 1

[gcode_macro M141]
description: Set chamber temperature (Panda Breath)
gcode:
    {% set s = params.S|default(0)|float %}
    SET_HEATER_TEMPERATURE HEATER="panda_breath" TARGET={s}

[gcode_macro M191]
description: Wait for Chamber Temperature
gcode:
    {% set s = params.S|default(0)|float %}
    M141 S{s}
    TEMPERATURE_WAIT SENSOR="heater_generic panda_breath" MINIMUM={s}
