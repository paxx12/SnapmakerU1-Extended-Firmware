settings:
  tweaks:
    items:
      panda_breath:
        label: Panda Breath Chamber Heater
        description: Experimental BIQU Panda Breath WiFi chamber heater integration via WebSocket. Requires stable network connectivity, may be interrupted by WiFi or device communication issues, and should not be used unattended.
        help_url: https://github.com/justinh-rahb/panda-breath
        get_cmd:
          - bash
          - -c
          - test -f /oem/printer_data/config/extended/klipper/panda_breath.cfg && echo "enabled" || echo "disabled"
        options:
          enabled:
            label: Enabled
            confirm: "Enable Panda Breath? This experimental integration adds chamber heater control via SET_HEATER_TEMPERATURE and M141. It depends on reliable WiFi/WebSocket connectivity to the Panda Breath, may stop working if the device or network connection is interrupted, and should not be used unattended."
            cmd:
              - bash
              - -xc
              - |
                ln -sf /usr/local/share/firmware-config/tweaks/klipper/panda_breath.py /home/lava/klipper/klippy/extras/panda_breath.py &&
                cp -n /usr/local/share/firmware-config/tweaks/klipper/panda_breath.cfg /oem/printer_data/config/extended/klipper/panda_breath.cfg &&
                echo "Panda Breath enabled. Restarting Klipper..." &&
                /etc/init.d/S60klipper restart
          disabled:
            label: Disabled
            cmd:
              - bash
              - -xc
              - |
                rm -vf /home/lava/klipper/klippy/extras/panda_breath.py &&
                rm -vf /oem/printer_data/config/extended/klipper/panda_breath.cfg &&
                echo "Panda Breath disabled. Restarting Klipper..." &&
                /etc/init.d/S60klipper restart
        default: disabled
