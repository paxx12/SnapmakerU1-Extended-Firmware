settings:
  tweaks:
    items:
      panda_breath:
        label: Panda Breath Chamber Heater
        description: Choose how Panda Breath chamber heating is integrated. Auto uses Panda native auto mode after heat-up and is recommended for stock firmware v1.0.3+. Manual keeps the older pure heater_generic fallback.
        help_url: https://github.com/justinh-rahb/pandabreath-klipper
        get_cmd:
          - bash
          - -c
          - |
            mode=$(/usr/local/bin/extended-config.py get /oem/printer_data/config/extended/extended2.cfg tweaks panda_breath "__unset__" 2>/dev/null || echo "__unset__")
            case "$mode" in
              disabled|auto|manual)
                echo "$mode"
                ;;
              *)
                if test -f /oem/printer_data/config/extended/klipper/panda_breath.cfg; then
                  echo "manual"
                else
                  echo "disabled"
                fi
                ;;
            esac
        options:
          disabled:
            label: Disabled
            cmd:
              - bash
              - -xc
              - |
                /usr/local/bin/extended-config.py add /oem/printer_data/config/extended/extended2.cfg tweaks panda_breath disabled &&
                rm -vf /oem/printer_data/config/extended/klipper/panda_breath.cfg &&
                /etc/init.d/S59panda-breath stop &&
                echo "Panda Breath disabled. Restarting Klipper..." &&
                /etc/init.d/S60klipper restart
          auto:
            label: Auto (Recommended, requires Panda firmware v1.0.3+)
            confirm: "Enable Panda Breath auto mode? This is the recommended stock-firmware path for Panda firmware v1.0.3+. It heats up with Klipper first, then hands off hold and cool behavior to Panda native auto mode."
            cmd:
              - bash
              - -xc
              - |
                /usr/local/bin/extended-config.py add /oem/printer_data/config/extended/extended2.cfg tweaks panda_breath auto &&
                mkdir -p /oem/printer_data/config/extended/klipper &&
                if [ ! -e /oem/printer_data/config/extended/klipper/panda_breath.cfg ]; then
                  cp /usr/local/share/firmware-config/tweaks/klipper/panda_breath.cfg /oem/printer_data/config/extended/klipper/panda_breath.cfg;
                fi &&
                chown lava:lava /oem/printer_data/config/extended/klipper/panda_breath.cfg &&
                /etc/init.d/S59panda-breath start &&
                echo "Panda Breath auto mode enabled. Restarting Klipper..." &&
                /etc/init.d/S60klipper restart
          manual:
            label: Manual (Legacy fallback, may be less safe)
            confirm: "Enable Panda Breath manual mode? This keeps the older pure heater_generic behavior as a compatibility fallback for older Panda firmware, but may be less safe if device or network connectivity is lost."
            cmd:
              - bash
              - -xc
              - |
                /usr/local/bin/extended-config.py add /oem/printer_data/config/extended/extended2.cfg tweaks panda_breath manual &&
                mkdir -p /oem/printer_data/config/extended/klipper &&
                if [ ! -e /oem/printer_data/config/extended/klipper/panda_breath.cfg ]; then
                  cp /usr/local/share/firmware-config/tweaks/klipper/panda_breath.cfg /oem/printer_data/config/extended/klipper/panda_breath.cfg;
                fi &&
                chown lava:lava /oem/printer_data/config/extended/klipper/panda_breath.cfg &&
                /etc/init.d/S59panda-breath start &&
                echo "Panda Breath manual mode enabled. Restarting Klipper..." &&
                /etc/init.d/S60klipper restart
        default: disabled
