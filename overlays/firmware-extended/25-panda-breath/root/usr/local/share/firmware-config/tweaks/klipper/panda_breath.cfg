# Panda Breath — Chamber Heater
# This file is managed by firmware-config. Do not edit directly.
# To change settings, edit the copy in:
#   /home/lava/printer_data/config/extended/klipper/panda_breath.cfg

[panda_breath]
firmware: stock
# You may need to change the host to the IP address of your Panda Breath device
host: PandaBreath.local
port: 80

[gcode_macro M141]
description: Set Chamber Temperature
gcode:
    {% set s = params.S|default(0)|float %}
    SET_HEATER_TEMPERATURE HEATER=panda_breath TARGET={s}

[gcode_macro M191]
description: Wait for Chamber Temperature
gcode:
    {% set s = params.S|default(0)|float %}
    M141 S{s}
    TEMPERATURE_WAIT SENSOR=panda_breath MINIMUM={s}
